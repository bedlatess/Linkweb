# ═══════════════════════════════════════════════════════════════
# LinkWeb — Nginx 配置（用于 NPM 或独立 Nginx）
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name link.pawn.eu.org;

    # 强制 HTTPS 跳转
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name link.pawn.eu.org;

    # SSL 证书（Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/link.pawn.eu.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/link.pawn.eu.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/linkweb.access.log;
    error_log  /var/log/nginx/linkweb.error.log;

    # 客户端上传限制（头像、背景图）
    client_max_body_size 10M;

    # 代理到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3010;

        # WebSocket 支持（Next.js 开发模式需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 必需的代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # 静态资源缓存（Next.js /_next/static 目录）
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 图片缓存
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        proxy_pass http://127.0.0.1:3010;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
